<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 450" role="img" aria-label="How an Economy Grows and Why It Crashes by Peter and Andrew Schiff">
  <defs>
    <linearGradient id="ec-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffb703"/>
      <stop offset="1" stop-color="#fb9d00"/>
    </linearGradient>
  </defs>
  <rect width="300" height="450" rx="6" fill="url(#ec-bg)"/>
  <rect x="0" y="0" width="300" height="8" fill="#023047"/>

  <!-- grid -->
  <g stroke="#023047" stroke-width="1" opacity="0.18">
    <line x1="30" y1="120" x2="270" y2="120"/>
    <line x1="30" y1="170" x2="270" y2="170"/>
    <line x1="30" y1="220" x2="270" y2="220"/>
  </g>

  <!-- boom then crash line chart -->
  <polyline points="36,230 78,200 112,210 150,150 188,170 214,110 240,250"
            fill="none" stroke="#023047" stroke-width="5"
            stroke-linejoin="round" stroke-linecap="round"/>
  <!-- crash arrow head -->
  <path d="M240 250 l-14 -10 m14 10 l4 -17" fill="none" stroke="#023047" stroke-width="5" stroke-linecap="round"/>
  <!-- peak marker -->
  <circle cx="214" cy="110" r="6" fill="#023047"/>

  <!-- title -->
  <text x="150" y="300" text-anchor="middle" fill="#023047" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="22" letter-spacing="0.5">
    <tspan x="150" dy="0">HOW AN</tspan>
    <tspan x="150" dy="26">ECONOMY GROWS</tspan>
    <tspan x="150" dy="26" font-weight="600" font-size="16">and why it</tspan>
    <tspan x="150" dy="24" font-size="26">CRASHES</tspan>
  </text>
  <line x1="105" y1="410" x2="195" y2="410" stroke="#023047" stroke-width="2"/>
  <text x="150" y="432" text-anchor="middle" fill="#023047" font-family="Arial, Helvetica, sans-serif" font-size="13" letter-spacing="0.5">Peter &amp; Andrew Schiff</text>
</svg>
