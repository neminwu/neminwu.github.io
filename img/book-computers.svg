<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 450" role="img" aria-label="How Computers Work by Ron White">
  <defs>
    <linearGradient id="cw-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#023047"/>
      <stop offset="1" stop-color="#011a26"/>
    </linearGradient>
  </defs>
  <rect width="300" height="450" rx="6" fill="url(#cw-bg)"/>
  <rect x="0" y="0" width="300" height="8" fill="#ffb703"/>

  <!-- circuit traces -->
  <g stroke="#219ebc" stroke-width="2.5" fill="none" opacity="0.9">
    <path d="M30 120 H90 V160 H140"/>
    <path d="M270 110 H210 V150 H150"/>
    <path d="M40 220 H110"/>
    <path d="M260 230 H190 V200"/>
    <path d="M150 250 V300 H210"/>
    <path d="M150 190 V150"/>
  </g>
  <g fill="#8ecae6">
    <circle cx="30" cy="120" r="5"/>
    <circle cx="270" cy="110" r="5"/>
    <circle cx="40" cy="220" r="5"/>
    <circle cx="260" cy="230" r="5"/>
    <circle cx="210" cy="300" r="5"/>
  </g>

  <!-- CPU chip -->
  <g>
    <rect x="118" y="158" width="64" height="64" rx="6" fill="#012535" stroke="#8ecae6" stroke-width="2.5"/>
    <rect x="132" y="172" width="36" height="36" rx="3" fill="#219ebc"/>
    <g stroke="#8ecae6" stroke-width="2.5">
      <line x1="128" y1="158" x2="128" y2="148"/>
      <line x1="150" y1="158" x2="150" y2="148"/>
      <line x1="172" y1="158" x2="172" y2="148"/>
      <line x1="128" y1="222" x2="128" y2="232"/>
      <line x1="150" y1="222" x2="150" y2="232"/>
      <line x1="172" y1="222" x2="172" y2="232"/>
    </g>
  </g>

  <!-- title -->
  <text x="150" y="338" text-anchor="middle" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="26" letter-spacing="1">
    <tspan x="150" dy="0">HOW</tspan>
    <tspan x="150" dy="30">COMPUTERS</tspan>
    <tspan x="150" dy="30">WORK</tspan>
  </text>
  <line x1="110" y1="412" x2="190" y2="412" stroke="#ffb703" stroke-width="2"/>
  <text x="150" y="430" text-anchor="middle" fill="#8ecae6" font-family="Arial, Helvetica, sans-serif" font-size="14" letter-spacing="1">Ron White</text>
</svg>
